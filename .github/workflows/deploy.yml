# Deploy site tĩnh (mirror của dannyxs.com) lên GitHub Pages.
# Đây là site HTML/CSS thuần, KHÔNG cần build. Mỗi lần push lên main là tự deploy.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # toàn bộ thư mục gốc (đã có .nojekyll cho các thư mục _assets, _woff...)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
